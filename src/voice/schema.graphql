schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.11",
    import: ["@key", "@shareable", "@external"]
  ) {
  query: Query
  mutation: Mutation
}

scalar DateTime
scalar JSON

type Query {
  _empty: String @shareable
}

input TextToSpeechInput {
  text: String!
  language: String
  voice: String
}

input SpeechToTextInput {
  audio: String!
  language: String
}

input VoiceChatInput {
  audio: String!
  language: String
  voice: String
}

type VoiceAudio {
  success: Boolean!
  audio: String
  format: String
}

type VoiceChatResponse {
  success: Boolean!
  transcript: String
  response: String
  audio: String
}

type Mutation {
  textToSpeech(input: TextToSpeechInput!): VoiceAudio!
  speechToText(input: SpeechToTextInput!): VoiceAudio!
  voiceChat(input: VoiceChatInput!): VoiceChatResponse!
}
