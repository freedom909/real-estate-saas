schema
  @link(url: "https://specs.apollo.dev/federation/v2.11", import: ["@key","@external","@shareable"]) {
  query: Query
}
scalar JSON
scalar DateTime 
type Query {
  ### Bookings
  bookingsForTenant(listingId: ID!, status: BookingStatus): [Booking!]! @shareable
  bookingsForCustomer(userId: ID!): [Booking!] @shareable
  myBookings: [Booking!]! @shareable
  currentCustomerBooking: Booking @shareable
  upcomingCustomerBookings: [Booking!]! @shareable
  pastCustomerBookings: [Booking!]! @shareable
  customerBookings: [Booking!]! @shareable
  booking(id: ID!): Booking @shareable
  
}

extend type User @key(fields: "id") {
  id: ID! @external
  bookings: [Booking!]! @shareable 
  listings: [Listing!]! @shareable 
}

extend type Tenant @key(fields: "id") {
  id: ID! @external
  listings: [Listing!]! @shareable
  bookings: [Booking!]! @shareable 
}


type CancelBookingResponse implements MutationResponse {
  code: Int! @shareable
  success: Boolean! @shareable
  message: String! @shareable
  booking: Booking! @shareable
}

type Mutation {
  createBooking(input: CreateBookingInput!): CreateBookingResponse! @shareable
  cancelBooking(id: ID!, reason: String): CancelBookingResponse @shareable
  confirmBooking(id: ID!): Booking! @shareable
  completeBooking(id: ID!): Booking! @shareable
  analyzeBookingFraud(bookingId: ID!): FraudAnalysisResponse!
}

type FraudAnalysisResponse {
    agentName: String!
    assessment: JSON! 
  }
  
type CreateBookingResponse {
  code: Int! @shareable
  success: Boolean! @shareable
  message: String! @shareable
  booking: Booking! @shareable
}

enum BookingStatus {
PENDING
CONFIRMED
CANCELLED
COMPLETED
}

enum BookingLifecycleStatus {
  UPCOMING
  CURRENT
  PAST
}

type Booking @key(fields: "id") {
id: ID!

tenant: Tenant!

listing: Listing!

customer: User!

checkInDate: DateTime!

checkOutDate: DateTime!

price: Float!

status: BookingStatus!

lifecycleStatus: BookingLifecycleStatus!

createdAt: DateTime!

updatedAt: DateTime
}

extend type Listing @key(fields: "id") {
  id: ID! @external
  bookings: [Booking!]! @shareable
}


type ReservedDate @shareable {
  checkInDate: DateTime!
  checkOutDate: DateTime!
}

type Review @key(fields: "id") {
  id: ID!
}

interface MutationResponse {
  code: Int!
  success: Boolean!
  message: String!
}

input CreateBookingInput {
  listingId: ID!
  checkInDate: DateTime!
  checkOutDate: DateTime!
}