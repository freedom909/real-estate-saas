schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.11"
    import: ["@key", "@external", "@shareable"]
  ) {
  query: Query
  mutation: Mutation
}

scalar DateTime

type User @key(fields:"id") {
 id: ID!
 email: String! @shareable
 role: Role! @shareable
 profile: Profile!
 status: AccountStatus!
 createdAt: DateTime!
}

type Credential @key(fields: "id") {
  id: ID!
  user: User!
  provider: String!
  providerUserId: String!
  createdAt: DateTime!
}

type Profile {
 name: String
 avatar: String
}

enum Role {
 ADMIN
 OWNER
 AGENT
 CUSTOMER
}

type Query {
  user(id: ID!): User

 userByEmail(email: String!): User

 # Admin queries
 users(limit: Int, offset: Int): [User!]!
 userCount: Int!
}

input CreateUserInput {
  email: String!
  name: String!
  role: Role
  password: String!
}

type Mutation {

 updateProfile(
   userId: ID!
   name: String
   avatar: String
 ): User!

   deactivateUser(
   userId: ID!
 ): Boolean!

 createUser(input: CreateUserInput!): User!
}

enum AccountStatus {
 ACTIVE
 SUSPENDED
 BANNED
 DELETED
}