schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.11"
    import: ["@key", "@shareable"]
  ) {
  query: Query
  mutation: Mutation
}

scalar DateTime

"""
User subgraph owns User
"""
type User @key(fields: "id") {
  id: ID!
  email: String
  profile: Profile
  status: AccountStatus!
  tokenVersion: Int!
  createdAt: DateTime!

  """
  User can belong to multiple Hosts (multi-tenant)
  """
  memberships: [Membership!]
}

"""
A Host is a business entity (tenant / organization / landlord)
"""
type Host @key(fields: "id") {
  id: ID!
  name: String!

  """
  Creator / owner of the host
  """
  ownerId: ID!

  createdAt: DateTime!
}

"""
Join table between User and Host
"""
type Membership @key(fields: "id") {
  id: ID!

  user: User!
  host: Host!

  """
  Role inside this host (NOT global role)
  """
  role: MembershipRole!

  approvalStatus: ApprovalStatus!

  createdAt: DateTime!
}

"""
User profile (shareable across subgraphs)
"""
type Profile @shareable {
  name: String
  avatar: String
  email: String
}

"""
Role inside a Host (multi-tenant role)
"""
enum MembershipRole {
  OWNER
  ADMIN
  MEMBER
}

"""
User account status
"""
enum AccountStatus {
  ACTIVE
  BANNED
  SUSPENDED
  DELETED
}

"""
Membership approval flow
"""
enum ApprovalStatus {
  NONE
  PENDING
  APPROVED
  REJECTED
}

"""
OAuth providers
"""
enum OAuthProvider {
  GOOGLE
  APPLE
  GITHUB
  FACEBOOK
  LINE
}

# ======================
# Queries
# ======================

type Query {
  user(id: ID!): User
  userByEmail(email: String!): User

  """
  Multi-tenant queries
  """
  hostsByUser(userId: ID!): [Host!]!
  membershipsByUser(userId: ID!): [Membership!]!
}

# ======================
# Mutations
# ======================

type Mutation {
  # -------- User --------
  createOAuthUser(input: CreateOAuthUserInput!): User!
  deactivateUser(userId: ID!): Boolean!
  updateLastLogin(userId: ID!): Boolean!

  # -------- Host --------
  createHost(name: String!): Host!

  # -------- Membership --------
  addUserToHost(
    hostId: ID!
    userId: ID!
    role: MembershipRole!
  ): Membership!

  removeUserFromHost(
    hostId: ID!
    userId: ID!
  ): Boolean!

  updateMembershipRole(
    hostId: ID!
    userId: ID!
    role: MembershipRole!
  ): Membership!

  approveMembership(
    membershipId: ID!
  ): Membership!
}

# ======================
# Inputs
# ======================

input CreateOAuthUserInput {
  email: String
  profile: ProfileInput
  provider: OAuthProvider!
}

input ProfileInput {
  email: String
  name: String
  avatar: String
}