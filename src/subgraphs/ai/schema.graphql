schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.11"
    import: ["@key", "@external"]
  ) {
  query: Query
  mutation: Mutation
}

scalar DateTime
scalar JSON

 type ChatResponse {
    reply: String!
  }

  input ChatInput {
    message: String!
    userId: String!
  }

type Query {
  _empty: String
}
  extend type Mutation {
    chat(input: ChatInput!): ChatResponse!
    analyzeBookingFraud(bookingId: ID!): FraudAnalysisResponse!
  }

  type FraudAnalysisResponse {
    agentName: String!
    assessment: JSON! // Unknown type JSON
  }