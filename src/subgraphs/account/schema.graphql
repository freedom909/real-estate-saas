schema
  @link(url: "https://specs.apollo.dev/federation/v2.11", import: ["@key","@external","@shareable"]) {
  query: Query
}
scalar JSON
scalar DateTime 

scalar JSON

scalar DateTime

enum AccountStatus {

ACTIVE

INACTIVE

}

enum BookingStatus {

PENDING

CONFIRMED

CANCELLED

FAILED

COMPLETED

}

enum ListingStatus {

PENDING

PUBLISH

}

enum ReviewStatus {

PENDING

PUBLISH

}

# =====================

# User (扩展用户中心)

# =====================

extend type User @key(fields: "id") {

id: ID! @external

myBookings: [Booking!]! @shareable

myListings: [Listing!]! @shareable

myReviews: [Review!]! @shareable

}

# =====================

# Tenant (只保留租户身份)

# =====================

extend type Tenant @key(fields: "id") {

id: ID! @external

}

# =====================

# Booking 引用

# =====================

extend type Booking @key(fields: "id") {

id: ID! @external

}

# =====================

# Listing 引用

# =====================

extend type Listing @key(fields: "id") {

id: ID! @external

}

# =====================

# Review 引用

# =====================

extend type Review @key(fields: "id") {

id: ID! @external

}

# =====================

# Account Dashboard

# =====================

type AccountDashboard {

bookings: [Booking!]!

listings: [Listing!]!

reviews: [Review!]!

}

type Query {

myDashboard: AccountDashboard!

}