schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.11",
    import: ["@key", "@shareable", "@external"]
  ) {
  query: Query
  mutation: Mutation
}

scalar DateTime

# -----------------------------------
# Listing Entity
# -----------------------------------
type Listing @key(fields: "id") {
  id: ID!

  title: String! @shareable
  description: String! @shareable

  address: String!
  owner: User!
  ownerId: ID! @shareable
  locationId: ID!

  categories: [Category!]!
  amenityIds: [Amenity!]!

  numOfBeds: Int! @shareable
  numOfCustomers: Int! @shareable
  numOfBathrooms: Int!
  numOfRooms: Int!

  price: Float! @shareable
  pricePerNight: Float! 
  picture: [String!]

  isFeatured: Boolean!

  createdAt: DateTime!
  updatedAt: DateTime
}

# -----------------------------------
# Owner Federation Extension
# -----------------------------------
extend type Owner @key(fields: "id") {
  id: ID! @external

  listings: [Listing!] @shareable
}

# -----------------------------------
# Category
# -----------------------------------
type Category {
  id: ID!
  name: String!
}

# -----------------------------------
# Amenity
# -----------------------------------
extend type Amenity @key(fields: "id") {
  id: ID! @external 
  type: String
}

# -----------------------------------
# Create Listing Input
# -----------------------------------
input CreateListingInput {
  title: String!
  description: String!

  address: String!


  ownerId: ID!

  locationId: ID!

  categories: [ID!]!
  amenityIds: [ID!]

  numOfBeds: Int
  numOfCustomers: Int
  numOfBathrooms: Int
  numOfRooms: Int

  price: Float
  pricePerNight: Float! 
  picture: [String!]

  isFeatured: Boolean
}

# -----------------------------------
# AI Responses
# -----------------------------------
type ApplyTitleResponse {
  listingId: ID!
  title: String!
}

type ApplyDescriptionResponse {
  listingId: ID!
  description: String!
}

# -----------------------------------
# Queries
# -----------------------------------
type Query {
  listing(id: ID!): Listing
  listingAISuggestions(listingId: ID!): [ListingAISuggestion!]!
  listings: [Listing!]!
  featuredListings(limit: Int): [Listing!]!
  listingsByOwner(ownerId: ID!): [Listing!]!
}

type ListingAISuggestion {
  id: ID!

  listingId: ID!

  type: String!

  prompt: String!

  suggestion: SuggestionStatus!

  model: String

  createdAt: String!
}

enum SuggestionStatus {
PENDING
APPLIED
REJECTED
EXPIRED
}

extend type User @key(fields: "id") {
id: ID! @external
}

# -----------------------------------
# Mutations
# -----------------------------------
type Mutation {
  createListing(input: CreateListingInput!): Listing!
  generateTitleSuggestion(
    listingId: ID!
  ): String!

  generateDescriptionSuggestion(
    listingId: ID!
  ): String!

  applyAISuggestion(
    suggestionId: ID!
  ): Listing!
}