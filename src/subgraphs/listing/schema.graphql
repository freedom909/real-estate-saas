schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.11",
    import: ["@key", "@shareable", "@external"]
  ) {
  query: Query
  mutation: Mutation
}

scalar DateTime

# -----------------------------
# Listing Entity (Owned here)
# -----------------------------
type Listing @key(fields: "id") {
  id: ID!

  hostId: ID!
  ownerId: ID!

  title: String!
  description: String!
  address: String!

  categories: [String!]!
  amenityIds: [ID!]

  host: Host

  createdAt: DateTime!
  updatedAt: DateTime!
}

# -----------------------------
# Host (Federation extension)
# -----------------------------
extend type Host @key(fields: "id") {
  id: ID! @external

  """
  All listings under this host
  """
  listings: [Listing!]!
}

# -----------------------------
# Inputs
# -----------------------------
input CreateListingInput {
  locationId: ID!
  ownerId: ID!
  title: String!
  description: String!
  address: String!
  categories: [String!]!
  amenityIds: [ID!]
  hostId: ID!
}

# -----------------------------
# AI Responses
# -----------------------------
type ApplyTitleResponse {
  listingId: ID!
  title: String!
}

type ApplyDescriptionResponse {
  listingId: ID!
  description: String!
}

# -----------------------------
# Queries
# -----------------------------
type Query {
  listing(id: ID!): Listing
  listingsByHost(hostId: ID!): [Listing!]!
}

# -----------------------------
# Mutations
# -----------------------------
type Mutation {
  createListing(input: CreateListingInput!): Listing!
  applyTitleSuggestion(listingId: ID!): ApplyTitleResponse!
  applyDescriptionSuggestion(listingId: ID!): ApplyDescriptionResponse!
}
