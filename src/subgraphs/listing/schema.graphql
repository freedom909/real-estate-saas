extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.0",
        import: ["@key", "@external"])

type Listing @key(fields: "id") {
  id: ID!
  title: String!
  description: String
  address: String!
  categories: [String!]!
  amenityIds: [ID!]
  tenantId: ID!
  tenant: Tenant @external
}

extend type Tenant @key(fields: "id") {
  id: ID! @external
  properties: [Listing!]!
}

input CreateListingInput {
  title: String!
  description: String
  address: String!
  categories: [String!]!
  amenityIds: [ID!]
  tenantId: ID!
}

type Mutation {
  createListing(input: CreateListingInput!): Listing!
}