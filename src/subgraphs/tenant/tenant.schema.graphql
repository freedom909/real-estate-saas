schema

@link(

url: "https://specs.apollo.dev/federation/v2.11"
,

import: ["@key", "@shareable", "@external"]

) {

query: Query

mutation: Mutation

}

scalar DateTime

enum TenantStatus {

ACTIVE

SUSPENDED

DELETED

}

extend type User @key(fields: "id") {

id: ID! @external

}

type Tenant @key(fields: "id") {

id: ID! @shareable

name: String! @shareable

slug: String!

status: TenantStatus!

owner: User! # 一对一关系

createdAt: DateTime

updatedAt: DateTime

}

type PageInfo {

total: Int!

hasNextPage: Boolean!

}

type TenantConnection {

items: [Tenant!]!

pageInfo: PageInfo!

}

input CreateTenantInput {

name: String!

slug: String!

ownerUserId: ID!

}

input TenantFilterInput {

keyword: String

status: TenantStatus

limit: Int

offset: Int

}

type Query {

getTenant(id: ID!): Tenant

getTenants(filter: TenantFilterInput): TenantConnection!

}

type Mutation {

createTenant(input: CreateTenantInput!): Tenant!

updateTenant(id: ID!, name: String!): Tenant!

suspendTenant(id: ID!): Tenant!

}