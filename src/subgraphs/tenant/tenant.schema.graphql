
extend schema @link(url: "https://specs.apollo.dev/federation/v2.11", import: ["@key"])

type Host @key(fields: "id") {
  id: ID!
  name: String!
  slug: String!
  createdAt: String
  updatedAt: String
}

type User @key(fields: "id") {
  id: ID!
  hosts: [Host!]!
}

input CreateHostInput {
  name: String!
  slug: String!
}

type Query {
  getHost(id: ID!): Host
  getHosts: [Host!]!
}

type Mutation {
  createHost(input: CreateHostInput!): Host!
}