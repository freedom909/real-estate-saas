schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.11",
    import: ["@key", "@shareable"]
  ) {
  query: Query
  mutation: Mutation
}

enum TenantStatus {
  ACTIVE
  SUSPENDED
  DELETED
}

type Tenant @key(fields: "id") {
  id: ID! @shareable
  name: String! @shareable
  slug: String!
  status: TenantStatus!
  ownerUserId: String! @shareable
  createdAt: String
  updatedAt: String @shareable
}

type PageInfo {
  total: Int!
  hasNextPage: Boolean!
}

type TenantConnection {
  items: [Tenant!]!
  pageInfo: PageInfo!
}

input CreateTenantInput {
  name: String!
  slug: String!
  ownerUserId: String!
}

input TenantFilterInput {
  keyword: String
  status: TenantStatus
  limit: Int
  offset: Int
}

type Query {
  getTenant(id: ID!): Tenant
  getTenants(filter: TenantFilterInput): TenantConnection!
}

type Mutation {
  createTenant(input: CreateTenantInput!): Tenant!
  updateTenant(id: ID!, name: String!): Tenant!
  suspendTenant(id: ID!): Tenant!
}