extend schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.8"
    import: ["@key", "@shareable", "@external", "@requires", "@provides", "@override", "@inaccessible"]
  )

scalar DateTime

enum Role {
  ADMIN
  CUSTOMER
  HOST
  USER
  PENDING_HOST
}

enum BookingStatus {
  CURRENT
  COMPLETED
  UPCOMING
  PAST
  CANCELLED
  CONFIRMED
}

type User @key(fields: "id") {
  id: ID!
  email: String!
  name: String!
  role: Role!
}

type Tenant @key(fields: "id") {
  id: ID! @shareable
  email: String! @shareable
  name: String! @shareable
  role: Role! @shareable
  listings: [Listing!]! @shareable
}

type Customer @key(fields: "id") {
  id: ID! @shareable
  email: String! @shareable
  name: String! @shareable
  role: Role! @shareable
  bookings: [Booking!]! @shareable
}

type Booking @key(fields: "id") {
  id: ID!
  bookingNumber: String! @shareable
  isFeatured: Boolean! @shareable
  reservedDate: DateTime! @shareable
  listing: Listing! @shareable
  customer: Customer! @shareable
  review: Review @shareable
  checkInDate: DateTime! @shareable
  checkOutDate: DateTime! @shareable
  price: Float! @shareable
  status: BookingStatus! @shareable
  cancelledAt: DateTime @shareable
  confirmedAt: DateTime @shareable
}

type Listing @key(fields: "id") {
  id: ID! @shareable
  bookings: [Booking!]! @shareable
  title: String! @shareable
  description: String! @shareable
  
  hostId: ID! @shareable
  price: Float! @shareable
  bookingsCount: Int! @shareable
  reviewsCount: Int! @shareable
  checkInDate: String! @shareable
  checkOutDate: String! @shareable
  numOfCustomers: Int! @shareable
  numOfBeds: Int! @shareable
  status: ListingStatus! 
  averageRating: Float! @shareable
  saleAmount: Float! @shareable
}

enum ListingStatus {
  ACTIVE
  PENDING
  SOLD
  DELETED
  REJECT
  CANCELLED
  EXPIRED
  COMPLETED
}

type Review @key(fields: "id") {
  id: ID!
}

interface MutationResponse {
  code: Int!
  success: Boolean!
  message: String!
}

type CreateBookingResponse implements MutationResponse {
  code: Int! @shareable
  success: Boolean! @shareable
  message: String! @shareable
  booking: Booking @shareable
}

input CreateBookingInput {
  listingId: ID!
  bookingNumber: String
  isFeatured: Boolean
  reservedDate: DateTime
  checkInDate: DateTime!
  checkOutDate: DateTime!
  customerId: ID!
}

type Query {
  bookings: [Booking!]! @shareable
  getBookingsByUser(userId: ID!): [Booking] @shareable
  getBookingById(id: ID!): Booking @shareable
}

type Mutation {
  createBooking(input: CreateBookingInput!): CreateBookingResponse! @shareable
}

type CartItem {
  id: ID!
  cartId: ID!
  listingId: ID!
  quantity: Int!
  price: Float!
  checkInDate: DateTime
  checkOutDate: DateTime
  price: Float!
}

type Cart {
  id: ID!
  customerId: ID!
  checkInDate: DateTime
  checkOutDate: DateTime
  price: Float!
  cartItems: [CartItem!]!
}

type CartResponse implements MutationResponse {
  code: Int!
  success: Boolean!
  message: String!
  cart: Cart
}

input AddToCartInput {
  cartId: ID!
  customerId: ID!
  listingId: ID!
  quantity: Int
  price: Float
  checkInDate: DateTime
  checkOutDate: DateTime
}

input UpdateCartItemInput {
  cartId: ID!
  itemId: ID!
  quantity: Int
  price: Float
}

input RemoveFromCartInput {
  cartId: ID!
  itemId: ID!
}

extend type Query {
  getCart(cartId: ID!): Cart @shareable
  getCartsByCustomer(customerId: ID!): [Cart!]! @shareable
}

extend type Mutation {
  addToCart(input: AddToCartInput!): CartResponse! @shareable
  updateCartItem(input: UpdateCartItemInput!): CartResponse! @shareable
  removeFromCart(input: RemoveFromCartInput!): CartResponse! @shareable
}
