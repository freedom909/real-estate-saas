schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.11",
    import: ["@key", "@shareable", "@external"]
  ) {
  query: Query
  mutation: Mutation
}

scalar DateTime
scalar JSON

input ChatInput {
  message: String!
}

type Mutation {
  chat(input: ChatInput!): ChatResponse!
}

type ChatResponse {

  success: Boolean!

  summary: String!

  artifacts: [Artifact!]!
}

type Artifact {

  type: ArtifactType!

  content: JSON!
}

enum ArtifactType {
  TITLE
  DESCRIPTION
  SEO
  BOOKING
  REVIEW
  PRICE
}